<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#0A0F1E"/>

  <!-- Bar chart bars -->
  <rect x="72" y="118" width="10" height="24" rx="2" fill="#C9A84C" opacity="0.7"/>
  <rect x="86" y="108" width="10" height="34" rx="2" fill="#C9A84C" opacity="0.85"/>
  <rect x="100" y="96" width="10" height="46" rx="2" fill="#C9A84C"/>

  <!-- Arrow line going up-right -->
  <polyline points="68,130 85,110 100,118 130,78" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head -->
  <polyline points="120,72 130,78 124,89" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- J letter -->
  <text x="28" y="122" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#C9A84C" letter-spacing="-4">J</text>

  <!-- K letter -->
  <text x="108" y="122" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="#C9A84C" letter-spacing="-4">K</text>

  <!-- TRADING text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#C9A84C" text-anchor="middle" letter-spacing="6">TRADING</text>
</svg>
